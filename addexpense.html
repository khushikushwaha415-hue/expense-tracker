<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - ExpenseTracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/add-expense.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
</head>

<body>
    <nav class="navbar">
        <span class="logo">💰 ExpenseTracker</span>
        <div class="nav-right">
            <span id="welcome-msg">Welcome, User</span>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="form-container">
        <div class="form-card">
            <div class="form-top">
                <h2>Add New Expense</h2>
                <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back</button>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="description" placeholder="e.g. Grocery shopping">
            </div>
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" id="amount" placeholder="e.g. 500" min="1">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option value="">Select Category</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Education">Education</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date">
            </div>
            <p id="form-error" class="error-msg"></p>
            <p id="form-success" class="success-msg"></p>
            <button class="btn-submit" onclick="addExpense()">Add Expense</button>
        </div>
    </div>
    <script src="js/add-expense.js"></script>
</body>

</html>
