<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="auth-logo">💰</span>
                <h1>ExpenseTracker</h1>
                <p>Manage your expenses smartly</p>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Login</button>
                <button class="tab" onclick="showTab('register')">Register</button>
            </div>
            <div id="login">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password">
                </div>
                <p id="login-error" class="error-msg"></p>
                <button class="btn-primary" onclick="loginUser()">Login</button>
            </div>
            <div id="register" style="display:none;">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="reg-name" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Min 6 characters">
                </div>
                <p id="register-error" class="error-msg"></p>
                <button class="btn-primary" onclick="registerUser()">Register</button>
            </div>
            <p id="bottom-link" style="text-align:center; margin-top:1rem; font-size:13px;">
                Don't have an account? <span style="color:#1565c0; cursor:pointer;" onclick="showTab('register')">Register</span>
            </p>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>

</html>
