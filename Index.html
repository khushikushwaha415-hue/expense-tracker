<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker</title>
    <link rel="stylesheet" href="style.css">
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Add Expense - ExpenseTracker</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="dashboard.css">
        <link rel="stylesheet" href="addexpense.css">
    </head>

    <body>


        <nav class="navbar">
            <span class="logo">💰 ExpenseTracker</span>
            <div class="nav-right">
                <span id="welcome-msg">Welcome, User</span>
                <button onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="form-container">
            <div class="form-card">

                <div class="form-top">
                    <h2>Add New Expense</h2>
                    <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back</button>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description" placeholder="e.g. Grocery shopping">
                </div>

                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount" placeholder="e.g. 500" min="1">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
          <option value="">Select Category</option>
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Shopping">Shopping</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>

                <p id="form-error" class="error-msg"></p>
                <p id="form-success" class="success-msg"></p>

                <button class="btn-submit" onclick="addExpense()">Add Expense</button>

            </div>
        </div>

        <script src="addexpense.js"></script>
    </body>

    </html>
</head>

<body>

    <div class="container">
        <div class="auth-box">

            <!-- Header -->
            <div class="header">
                <h1>💰 ExpenseTracker</h1>
                <p>Manage your expenses smartly</p>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Login</button>
                <button class="tab" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div id="login" class="form-section">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="khushi@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <p id="login-error" class="error-msg"></p>
                <button class="btn-primary" onclick="loginUser()">Login</button>
            </div>

            <!-- Register Form -->
            <div id="register" class="form-section" style="display:none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Khushi">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="khushi@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••">
                </div>
                <p id="register-error" class="error-msg"></p>
                <button class="btn-primary" onclick="registerUser()">Register</button>
            </div>

            <!-- Bottom Link -->
            <p id="bottom-link" style="text-align: center; font-size: 13px; color: #888; margin-top: 1rem;">
                Don't have an account?
                <span style="color: #1565c0; cursor: pointer;" onclick="showTab('register')">Register</span>
            </p>

        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
