<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ExpenseTracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>
    <nav class="navbar">
        <span class="logo">💰 ExpenseTracker</span>
        <div class="nav-right">
            <span id="welcome-msg">Welcome, User</span>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="dashboard-container">
        <div class="cards-grid">
            <div class="card">
                <p class="card-label">Total Expenses</p>
                <p class="card-value" id="total-amount">₹0</p>
            </div>
            <div class="card">
                <p class="card-label">This Month</p>
                <p class="card-value red" id="month-amount">₹0</p>
            </div>
            <div class="card">
                <p class="card-label">Total Entries</p>
                <p class="card-value blue" id="total-entries">0</p>
            </div>
        </div>
        <div class="table-header">
            <div class="filters">
                <select id="filter-category" onchange="renderExpenses()">
          <option value="all">All Categories</option>
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Shopping">Shopping</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
                <select id="filter-month" onchange="renderExpenses()">
          <option value="all">All Time</option>
          <option value="this">This Month</option>
          <option value="last">Last Month</option>
        </select>
            </div>
            <button class="btn-add" onclick="window.location.href='add-expense.html'">+ Add Expense</button>
        </div>
        <div class="table-wrapper">
            <div class="table-head">
                <span>Description</span>
                <span>Category</span>
                <span>Date</span>
                <span>Amount</span>
                <span>Action</span>
            </div>
            <div id="expense-list"></div>
            <div id="no-expenses" class="no-data" style="display:none;">
                No expenses found. Click "+ Add Expense" to get started!
            </div>
        </div>
    </div>
    <script src="dashboard.js"></script>
</body>

</html>
