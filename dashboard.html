<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ExpenseTracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Add Expense - ExpenseTracker</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="dashboard.css">
        <link rel="stylesheet" href="addexpense.css">
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    </head>

    <body>


        <nav class="navbar">
            <span class="logo">💰 ExpenseTracker</span>
            <div class="nav-right">
                <span id="welcome-msg">Welcome, User</span>
                <button onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="form-container">
            <div class="form-card">

                <div class="form-top">
                    <h2>Add New Expense</h2>
                    <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back</button>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description" placeholder="e.g. Grocery shopping">
                </div>

                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount" placeholder="e.g. 500" min="1">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
          <option value="">Select Category</option>
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Shopping">Shopping</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>

                <p id="form-error" class="error-msg"></p>
                <p id="form-success" class="success-msg"></p>

                <button class="btn-submit" onclick="addExpense()">Add Expense</button>

            </div>
        </div>

        <script src="addexpense.js"></script>
    </body>

    </html>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <span class="logo">💰 ExpenseTracker</span>
        <div class="nav-right">
            <span id="welcome-msg">Welcome, User</span>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">

        <!-- Summary Cards -->
        <div class="cards-grid">
            <div class="card">
                <p class="card-label">Total Expenses</p>
                <p class="card-value" id="total-amount">₹0</p>
            </div>
            <div class="card">
                <p class="card-label">This Month</p>
                <p class="card-value red" id="month-amount">₹0</p>
            </div>
            <div class="card">
                <p class="card-label">Total Entries</p>
                <p class="card-value blue" id="total-entries">0</p>
            </div>
        </div>

        <!-- Filters + Add Button -->
        <div class="table-header">
            <div class="filters">
                <select id="filter-category" onchange="renderExpenses()">
          <option value="all">All Categories</option>
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Shopping">Shopping</option>
          <option value="Education">Education</option>
          <option value="Other">Other</option>
        </select>
                <select id="filter-month" onchange="renderExpenses()">
          <option value="all">All Time</option>
          <option value="this">This Month</option>
          <option value="last">Last Month</option>
        </select>
            </div>
            <button class="btn-add" onclick="window.location.href='addexpense.html'">+ Add Expense</button>
        </div>

        <!-- Expense Table -->
        <div class="table-wrapper">
            <div class="table-head">
                <span>Description</span>
                <span>Category</span>
                <span>Date</span>
                <span>Amount</span>
                <span>Action</span>
            </div>
            <div id="expense-list">
                <!-- Expenses will load here -->
            </div>
            <div id="no-expenses" class="no-data" style="display:none;">
                No expenses found. Click "+ Add Expense" to get started!
            </div>
        </div>

    </div>

    <script src="dashboard.js"></script>
</body>

</html>
